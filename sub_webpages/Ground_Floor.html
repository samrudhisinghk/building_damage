<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ground Floor</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: 'Poppins', sans-serif;

            min-height: 100vh;

            padding: 50px 20px;

            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);

            color: white;
        }

        h1{
            text-align: center;

            font-size: 3.5rem;

            margin-bottom: 50px;

            text-shadow: 0 5px 18px rgba(0,0,0,0.35);
        }

        .container{
            max-width: 950px;
            margin: auto;
        }

        .card{
            background: rgba(255,255,255,0.10);

            backdrop-filter: blur(15px);

            border-radius: 24px;

            overflow: hidden;

            border: 1px solid rgba(255,255,255,0.15);

            box-shadow: 0 10px 35px rgba(0,0,0,0.35);

            transition: all 0.4s ease;
        }

        .card:hover{
            transform: translateY(-10px) scale(1.01);

            box-shadow: 0 18px 50px rgba(0,0,0,0.45);
        }

        img{
            width: 100%;
            height: 520px;

            object-fit: cover;
        }

        .content{
            padding: 30px;
        }

        h2{
            font-size: 2.3rem;

            margin-bottom: 15px;

            color: #ffffff;
        }

        p{
            font-size: 1.08rem;

            line-height: 1.7;

            color: rgba(255,255,255,0.88);
        }

        .status{
            display: inline-block;

            margin-top: 22px;

            padding: 10px 18px;

            border-radius: 30px;

            background: linear-gradient(45deg, #ff512f, #f09819);

            font-size: 0.95rem;

            font-weight: 600;

            box-shadow: 0 5px 15px rgba(0,0,0,0.25);
        }

        .footer{
            text-align: center;

            margin-top: 45px;

            color: rgba(255,255,255,0.7);

            font-size: 0.95rem;
        }

    </style>
</head>

<body>

    <h1>🏢 Ground Floor Inspection</h1>

    <div class="container">

        <div class="card">

            <img src="https://github.com/samrudhisinghk/building_damage/blob/main/Broken%20Tiles/Floor%20Dataset/Ground%20floor/Boys%20common%20room.jpg">

            <div class="content">

                <h2>🎮 Boy's Common Room</h2>

                <p>
                    Cracked and damaged tiles detected inside the Boy's Common Room area.
                    Immediate inspection is recommended to maintain safety and prevent further deterioration.
                </p>

                <span class="status">
                    ⚠ Structural Damage Detected
                </span>

            </div>

        </div>

    </div>

    <div class="footer">
        Campus Smart Maintenance Dashboard ✨
    </div>

</body>

</html>
