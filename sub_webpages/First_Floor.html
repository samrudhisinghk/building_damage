<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>First Floor</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: 'Poppins', sans-serif;

            min-height: 100vh;

            background: linear-gradient(135deg, #141e30, #243b55, #0f2027);

            padding: 50px 20px;

            color: white;
        }

        h1{
            text-align: center;

            font-size: 3.5rem;

            margin-bottom: 50px;

            text-shadow: 0 5px 15px rgba(0,0,0,0.35);
        }

        .container{
            max-width: 900px;
            margin: auto;
        }

        .card{
            background: rgba(255,255,255,0.10);

            backdrop-filter: blur(14px);

            border-radius: 24px;

            overflow: hidden;

            box-shadow: 0 10px 30px rgba(0,0,0,0.3);

            transition: 0.4s ease;

            border: 1px solid rgba(255,255,255,0.15);
        }

        .card:hover{
            transform: translateY(-8px) scale(1.01);

            box-shadow: 0 18px 45px rgba(0,0,0,0.4);
        }

        img{
            width: 100%;
            height: 500px;

            object-fit: cover;
        }

        .content{
            padding: 30px;
        }

        h2{
            font-size: 2.2rem;

            margin-bottom: 15px;

            color: #ffffff;
        }

        p{
            font-size: 1.1rem;

            color: rgba(255,255,255,0.85);

            line-height: 1.6;
        }

        .status{
            display: inline-block;

            margin-top: 20px;

            padding: 10px 18px;

            border-radius: 30px;

            background: linear-gradient(45deg, #ff512f, #dd2476);

            font-weight: 600;

            font-size: 0.95rem;
        }

        .footer{
            text-align: center;

            margin-top: 45px;

            color: rgba(255,255,255,0.7);

            font-size: 0.95rem;
        }

    </style>
</head>

<body>

    <h1>🏢 First Floor Inspection</h1>

    <div class="container">

        <div class="card">

            <img src="../Broken%20Tiles/Floor%20Dataset/First%20floor/C-%20101A%20%20.jpg">

            <div class="content">

                <h2>📍 Room C-101A</h2>

                <p>
                    Cracked flooring detected in Room C-101A.
                    The damaged tiles may affect safety and should be inspected for repair or replacement.
                </p>

                <span class="status">
                    ⚠ Damage Detected
                </span>

            </div>

        </div>

    </div>

    <div class="footer">
        Smart Infrastructure Monitoring System ✨
    </div>

</body>

</html>
