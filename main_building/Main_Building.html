<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Building</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;

            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg, #ff416c, #ff4b2b, #ffb347);

            overflow: hidden;
            position: relative;
        }

        /* Decorative Glow */
        body::before,
        body::after {
            content: "";
            position: absolute;

            width: 350px;
            height: 350px;

            border-radius: 50%;

            background: rgba(255,255,255,0.08);

            filter: blur(25px);
        }

        body::before {
            top: -120px;
            left: -120px;
        }

        body::after {
            bottom: -120px;
            right: -120px;
        }

        .container {
            width: 90%;
            max-width: 500px;

            padding: 50px;

            border-radius: 24px;

            background: rgba(255,255,255,0.12);

            backdrop-filter: blur(14px);

            text-align: center;

            box-shadow: 0 8px 40px rgba(0,0,0,0.25);

            border: 1px solid rgba(255,255,255,0.2);
        }

        h1 {
            color: white;

            font-size: 3rem;

            margin-bottom: 12px;

            text-shadow: 0 4px 12px rgba(0,0,0,0.3);
        }

        .subtitle {
            color: rgba(255,255,255,0.85);

            margin-bottom: 35px;

            font-size: 1rem;
        }

        .button {
            display: block;

            width: 100%;

            margin: 18px auto;

            padding: 16px 20px;

            text-decoration: none;

            font-size: 1.1rem;
            font-weight: 600;

            color: white;

            border-radius: 14px;

            background: linear-gradient(45deg, #ff6a00, #ee0979);

            box-shadow: 0 6px 18px rgba(0,0,0,0.25);

            transition: all 0.3s ease;
        }

        .button:hover {
            transform: translateY(-5px) scale(1.03);

            background: linear-gradient(45deg, #ff512f, #dd2476);

            box-shadow: 0 12px 25px rgba(0,0,0,0.35);
        }

        .button:active {
            transform: scale(0.98);
        }

        .footer {
            margin-top: 30px;

            color: rgba(255,255,255,0.7);

            font-size: 0.9rem;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>🏢 Main Building</h1>

        <p class="subtitle">
            Select Floor for Tile Inspection
        </p>

        <a href="https://github.com/samrudhisinghk/building_damage/blob/main/sub_webpages/Ground_Floor.html" class="button">
            🟢 Ground Floor
        </a>

        <a href="https://github.com/samrudhisinghk/building_damage/blob/main/sub_webpages/First_Floor.html" class="button">
            🔵 First Floor
        </a>

        <a href="https://github.com/samrudhisinghk/building_damage/blob/main/sub_webpages/Third_Floor.html" class="button">
            🟣 Third Floor
        </a>

        <div class="footer">
            Smart Inspection Portal ✨
        </div>

    </div>

</body>

</html>
